    function rGuar() { return `<span class="si fiu" style="font-size:64px">🛡️</span><h2 class="st fiu d1" style="font-size:20px">Cero Riesgo — <span class="gt">Garantía de 60 Días</span></h2><p class="ss fiu d2">Prueba el programa completo durante 60 días. Mira las lecciones. Aplica las técnicas. Si no sientes que valió cada centavo, obtén un reembolso completo — sin preguntas.</p><div class="gb fiu d3"><span class="gbi">✅</span><div class="gbt"><strong>100% de devolución</strong> dentro de 60 días. Incluso si solicitas reembolso, <strong>conservas los 3 bonos</strong> para siempre como agradecimiento.</div></div><div style="width:100%;display:flex;flex-direction:column;gap:8px;margin-top:16px" class="fiu d4"><div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)"><span>🔒</span> Encriptación de nivel bancario protege tus datos</div><div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)"><span>👁️</span> Cobro discreto — nadie lo sabrá</div><div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)"><span>📱</span> Acceso instantáneo en cualquier dispositivo</div></div><button class="cta fiu d5" onclick="next()">Estoy Listo — Muéstrame el Paso Final →</button>` }

    function rCta() { return `<span class="si fiu" style="font-size:52px">🔥</span><h2 class="st fiu d1" style="font-size:22px">Tu Lugar Está <span class="gt">Reservado</span></h2><p class="ss fiu d2">Este precio especial expira cuando el temporizador llegue a cero. Después, vuelve a $497.</p><div class="tmc fiu d3" id="tmc"><div class="tmb"><div class="tmv" id="tmm">14</div><div class="tml">Minutos</div></div><div style="font-size:24px;font-weight:800;color:var(--text2);padding-top:8px">:</div><div class="tmb"><div class="tmv" id="tms">59</div><div class="tml">Segundos</div></div></div><button class="cta pulse fiu d4" style="font-size:18px;padding:20px 32px" onclick="showConfirmation()">DESBLOQUEAR ACCESO COMPLETO — $27</button><div class="tbg fiu d5"><div class="tbgi">🔒 Seguro</div><div class="tbgi">🛡️ Garantía 60 Días</div><div class="tbgi">👁️ 100% Discreto</div></div><p style="font-size:11px;color:var(--text2);text-align:center;margin-top:20px;line-height:1.6" class="fiu d6">Acceso inmediato después de la compra. Funciona en cualquier dispositivo.<br>Tu estado de cuenta mostrará un nombre genérico y discreto.</p>` }

    function showConfirmation() {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
      overlay.innerHTML = `<div style="background:#12121a;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px 24px;max-width:400px;width:100%;text-align:center;">
        <div style="font-size:48px;margin-bottom:16px">✅</div>

        <p style="font-size:14px;color:#8888a0;line-height:1.6;margin-bottom:20px">Tu evaluación ha sido completada con éxito. Un representante se pondrá en contacto contigo pronto con los detalles de acceso al programa.</p>
        <p style="font-size:12px;color:#8b5cf6;font-weight:600;margin-bottom:20px">Revisa tu correo electrónico para los próximos pasos.</p>
        <button style="padding:14px 28px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;" onclick="this.closest('div').parentElement.remove()">Entendido</button>
      </div>`;
      document.body.appendChild(overlay);

    function esc(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;') }

    document.addEventListener('click', function (e) {
      const si = e.target.closest('[data-tp="single"]');
      if (si) { ans[si.dataset.k] = si.dataset.v; document.querySelectorAll('[data-tp="single"]').forEach(c => c.classList.remove('sel')); si.classList.add('sel'); setTimeout(next, 500); return }
      const yn = e.target.closest('[data-tp="yn"]');
      if (yn) { ans[yn.dataset.k] = yn.dataset.v; setTimeout(next, 400); return }
      const sc = e.target.closest('[data-tp="sc"]');
      if (sc) { ans[sc.dataset.k] = parseInt(sc.dataset.v); document.querySelectorAll('.sc-d').forEach(d => d.classList.remove('act')); sc.classList.add('act'); setTimeout(next, 600); return }
      const mi = e.target.closest('[data-tp="multi"]');
      if (mi) { const k = mi.dataset.k, v = mi.dataset.v; if (!ans[k]) ans[k] = []; if (mi.classList.contains('sel')) { mi.classList.remove('sel'); ans[k] = ans[k].filter(x => x !== v) } else { mi.classList.add('sel'); ans[k].push(v) } const b = document.getElementById('mc'); if (b) b.classList.toggle('en', ans[k].length > 0); return }
    });

    function next() {
      const el = document.getElementById('cs');
      if (el) { el.classList.remove('active'); el.classList.add('exit') }
      setTimeout(() => { cs++; if (cs < S.length) render(cs) }, 350);
    }

    function runLoad(s) {
      const msgs = s.msgs; let p = 0, mi = 0; const dur = 4500, iv = 50, inc = 100 / (dur / iv);
      const li = setInterval(() => {
        p += inc; const fl = document.getElementById('ldf'), tx = document.getElementById('ldt');
        if (fl) fl.style.width = Math.min(p, 100) + '%';
        const nm = Math.floor((p / 100) * msgs.length);
        if (nm !== mi && nm < msgs.length) { mi = nm; if (tx) { tx.style.opacity = 0; setTimeout(() => { if (tx) { tx.textContent = msgs[mi]; tx.style.opacity = 1 } }, 200) } }
        if (p >= 100) { clearInterval(li); setTimeout(next, 500) }
      }, iv);
    }

    function animGauge() {
      const sc = calcScore(), co = sColor(sc), se = document.getElementById('gsc'), bg = document.getElementById('gbg');
      if (!se || !bg) return; let c = 0;
      const ai = setInterval(() => { c++; if (c > sc) { clearInterval(ai); return } se.textContent = c; bg.style.background = 'conic-gradient(' + co + ' 0deg,' + co + ' ' + (c / 100 * 360) + 'deg,rgba(255,255,255,0.04) ' + (c / 100 * 360) + 'deg)' }, 20);
      setTimeout(() => { ['bf1', 'bf2', 'bf3', 'bf4'].forEach(id => { const el = document.getElementById(id); if (el) { const pr = el.closest('.bi'), vl = pr?.querySelector('.bv'); if (vl) el.style.width = vl.textContent } }) }, 600);
    }

    function animFeat() { document.querySelectorAll('.fc').forEach((c, i) => setTimeout(() => c.classList.add('vis'), 150 * (i + 1))) }
    function animBon() { document.querySelectorAll('.bc').forEach((c, i) => setTimeout(() => c.classList.add('vis'), 300 * (i + 1))) }

    function startCarousel() {
      let c = 0; const n = 4;
      tInt = setInterval(() => {
        const oc = document.getElementById('tc' + c), od = document.getElementById('td' + c);
        if (oc) oc.style.display = 'none'; if (od) od.classList.remove('act');
        c = (c + 1) % n;
        const nc = document.getElementById('tc' + c), nd = document.getElementById('td' + c);
        if (nc) nc.style.display = 'block'; if (nd) nd.classList.add('act');
      }, 3500);
    }

    function startTimer() {
      let m = 14, s = 59;
      tmInt = setInterval(() => {
        s--; if (s < 0) { s = 59; m-- } if (m < 0) { clearInterval(tmInt); return }
        const me = document.getElementById('tmm'), se = document.getElementById('tms');
        if (me) me.textContent = String(m).padStart(2, '0');
        if (se) se.textContent = String(s).padStart(2, '0');
      }, 1000);
    }

    render(0);
  </script>
